<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAKETEX - Build Log</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Teko:wght@500;700&family=Inter:wght@400;500;700&display=swap");

    :root {
      --bg: #090d13;
      --ink: #f5f7fa;
      --muted: #9aa3b0;
      --line: #273344;
      --panel: #101824;
      --panel-2: #0d1520;
      --accent: #f88c3d;
      --good: #62d8a0;
      --warn: #ff7373;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #05070b;
      color: var(--ink);
      font-family: "Inter", sans-serif;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }
    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    body::before {
      background: url("/assets/images/raketex-background.jpg") center center / cover no-repeat;
      filter: brightness(.72) saturate(.95);
    }
    body::after {
      display: none;
    }

    a { color: inherit; }
    button, input, textarea { font: inherit; }
    .page {
      max-width: 1120px;
      margin: 0 auto;
      padding: 18px;
      background: transparent;
      min-height: 100vh;
      position: relative;
      z-index: 1;
      box-shadow: none;
    }
    .top { margin-top: 18px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; }
    .logo { grid-column: 2; margin: 0; font-family: "Teko", sans-serif; letter-spacing: 1px; font-size: 92px; line-height: .78; text-decoration: none; text-align: center; }
    .menu { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .btn, .menu a, .menu button {
      border: 0;
      background: transparent;
      color: var(--ink);
      padding: 12px 24px;
      font-weight: 700;
      text-decoration: none;
      text-transform: lowercase;
      cursor: pointer;
      position: relative;
      clip-path: polygon(13px 0, calc(100% - 13px) 0, 100% 50%, calc(100% - 13px) 100%, 13px 100%, 0 50%);
      transition: background .16s ease, color .16s ease;
    }
    .btn::before, .menu a::before, .menu button::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -2;
      background: var(--line);
      clip-path: inherit;
    }
    .btn::after, .menu a::after, .menu button::after {
      content: "";
      position: absolute;
      inset: 1px;
      z-index: -1;
      background: #0b121c;
      clip-path: inherit;
    }
    .btn.primary, .menu .active { color: #fff; }
    .btn.primary::before, .menu .active::before, .menu a:hover::before, .menu button:hover::before { background: var(--accent); }
    .btn.primary::after, .menu .active::after { background: rgba(248, 140, 61, .22); }
    .btn:hover, .menu a:hover, .menu button:hover { color: #fff; }
    .hero {
      margin-top: 10px;
      border: 1px solid var(--line);
      min-height: 260px;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
    }
    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(100deg, rgba(6, 9, 14, .94) 18%, rgba(6, 9, 14, .38) 68%), url("/assets/design-images/falcon-heavy-liftoff.jpg") center/cover;
    }
    .hero-content { position: relative; padding: 26px; max-width: 720px; }
    .hero h1 { margin: 0 0 10px; font-family: "Teko", sans-serif; font-size: 76px; line-height: .88; letter-spacing: 0; }
    .hero p { margin: 0; color: #d8e0e8; max-width: 620px; }
    .panel { border: 1px solid var(--line); background: var(--panel); padding: 12px; margin-top: 12px; }
    .panel h2, .panel h3 { margin: 0 0 10px; font-family: "Teko", sans-serif; font-size: 34px; line-height: 1; letter-spacing: 0; }
    .blog-head { margin-top: 18px; display: flex; justify-content: flex-end; }
    .blog-head form { width: min(320px, 100%); }
    .blog-title { margin: 0; font-family: "Teko", sans-serif; font-size: 58px; line-height: .9; letter-spacing: 0; }
    .blog-list { border-top: 1px solid var(--line); margin-top: 12px; }
    .blog-entry {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 150px;
      gap: 16px;
      padding: 18px 28px;
      margin: 12px 0;
      position: relative;
      clip-path: polygon(24px 0, calc(100% - 24px) 0, 100% 50%, calc(100% - 24px) 100%, 24px 100%, 0 50%);
      background: rgba(16, 24, 36, .92);
      color: var(--ink);
      text-decoration: none;
      cursor: pointer;
      transition: transform .16s ease, color .16s ease;
    }
    .blog-entry::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -2;
      background: #344255;
      clip-path: inherit;
    }
    .blog-entry::after {
      content: "";
      position: absolute;
      inset: 1px;
      z-index: -1;
      background: rgba(13, 21, 32, .96);
      clip-path: inherit;
    }
    .blog-entry:hover { transform: translateX(3px); }
    .blog-entry:hover h2 { color: #ffc59e; }
    .blog-entry h2 { margin: 0 0 6px; font-family: "Teko", sans-serif; font-size: 36px; line-height: .95; letter-spacing: 0; }
    .blog-entry h2 a { text-decoration: none; color: var(--ink); }
    .blog-entry h2 a:hover { color: #ffc59e; }
    .blog-meta { color: #ffc59e; font-size: 13px; margin: 0 0 10px; }
    .blog-excerpt { margin: 0; line-height: 1.55; color: #d9e0e8; }
    .blog-thumb { width: 150px; aspect-ratio: 4 / 3; object-fit: contain; border: 1px solid #304055; background: #0a1018; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
    .card {
      background: var(--panel-2);
      padding: 14px 22px;
      position: relative;
      clip-path: polygon(18px 0, calc(100% - 18px) 0, 100% 50%, calc(100% - 18px) 100%, 18px 100%, 0 50%);
    }
    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -2;
      background: #2d3a4d;
      clip-path: inherit;
    }
    .card::after {
      content: "";
      position: absolute;
      inset: 1px;
      z-index: -1;
      background: var(--panel-2);
      clip-path: inherit;
    }
    .card h3 { font-size: 28px; margin-bottom: 6px; }
    .muted { color: var(--muted); font-size: 13px; margin: 4px 0; }
    .post-image { width: 100%; max-height: 640px; object-fit: contain; border: 1px solid #304055; margin-bottom: 8px; background: #0a1018; }
    .image-preview { display: none; width: 100%; max-height: 360px; object-fit: contain; border: 1px solid #304055; margin: 8px 0 0; background: #0a1018; }
    .image-preview.visible { display: block; }
    .flash {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 50;
      border: 1px solid var(--line);
      padding: 10px 16px;
      min-width: 180px;
      background: #0d1520;
      box-shadow: 0 16px 36px rgba(0, 0, 0, .45);
      animation: toastSlide 2.4s ease forwards;
      clip-path: polygon(12px 0, calc(100% - 12px) 0, 100% 50%, calc(100% - 12px) 100%, 12px 100%, 0 50%);
    }
    .flash.ok { color: var(--good); }
    .flash.warn { color: var(--warn); }
    @keyframes toastSlide {
      0% { transform: translateX(130%); opacity: 0; }
      14% { transform: translateX(0); opacity: 1; }
      78% { transform: translateX(0); opacity: 1; }
      100% { transform: translateX(130%); opacity: 0; }
    }
    .field { display: grid; gap: 5px; margin-bottom: 10px; }
    .field label { color: var(--muted); font-size: 12px; font-weight: 700; text-transform: lowercase; }
    input, textarea {
      width: 100%;
      border: 1px solid #35445a;
      background: #080d14;
      color: var(--ink);
      padding: 9px;
    }
    input[type="file"], input[type="checkbox"] { width: auto; }
    textarea { min-height: 160px; resize: vertical; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .post-body { white-space: pre-wrap; line-height: 1.65; color: #d9e0e8; }
    .admin-card {
      min-height: 560px;
      display: flex;
      flex-direction: column;
      border: 1px solid #2d3a4d;
      background: var(--panel-2);
      padding: 10px;
      clip-path: none;
    }
    .admin-card::before, .admin-card::after { display: none; }
    .admin-card .post-image {
      height: 280px;
      object-fit: contain;
      margin-bottom: 12px;
    }
    .admin-card-actions { margin-top: auto; }
    .login-wrap {
      min-height: 58vh;
      display: grid;
      place-items: center;
    }
    .login-panel {
      width: min(560px, 100%);
      padding: 28px;
    }
    .login-panel h2 { font-size: 46px; }
    .login-panel input { min-height: 54px; font-size: 18px; }
    .login-panel .btn { font-size: 20px; }

    @media (max-width: 780px) {
      .top { grid-template-columns: 1fr; }
      .logo { grid-column: auto; font-size: 72px; }
      .menu { justify-content: flex-start; }
      .hero h1 { font-size: 54px; }
      .blog-head { grid-template-columns: 1fr; }
      .blog-entry { grid-template-columns: 1fr; }
      .blog-thumb { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="top">
      <a class="logo" href="/">RAKETEX</a>
      <nav class="menu">
        
          <a class="active" href="/">posts</a>
          <a class="" href="/admin/login">admin</a>
        
      </nav>
    </header>

    
      
    

    
  <section class="blog-head">
    <form method="get">
      <input name="q" type="text" value="" placeholder="search posts" />
    </form>
  </section>

  <section class="blog-list">
    
      <div class="blog-entry">
        <div>
          <h2>No posts yet</h2>
          <p class="blog-excerpt">Create the first post from the admin page.</p>
        </div>
      </div>
    
  </section>

  </main>
</body>
</html>
